<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  body{margin:0;background:#EFE7DC;font-family:'Noto Sans JP',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  *{box-sizing:border-box}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.05)}100%{transform:scale(1)}}
</style>
</helmet>

<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:44px 24px;background:radial-gradient(120% 80% at 50% 0%,#F3ECE2 0%,#EAE0D3 100%)">
  <!-- device -->
  <div style="width:392px;background:#141414;border-radius:52px;padding:11px;box-shadow:0 40px 80px -24px rgba(60,30,10,.4),0 0 0 1px rgba(0,0,0,.06)">
    <div style="position:relative;width:370px;height:800px;background:#FFF8F0;border-radius:42px;overflow:hidden">

      <!-- status bar -->
      <div style="position:absolute;top:0;left:0;right:0;height:52px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 30px 8px;z-index:20;pointer-events:none">
        <span style="font:700 15px 'M PLUS Rounded 1c';color:#2B2B2B">9:41</span>
        <div style="display:flex;align-items:center;gap:6px;color:#2B2B2B">
          <svg width="17" height="12" viewBox="0 0 17 12" fill="currentColor"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="4.5" y="4.5" width="3" height="7.5" rx="1"/><rect x="9" y="2" width="3" height="10" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1" opacity=".35"/></svg>
          <svg width="24" height="12" viewBox="0 0 24 12" fill="none"><rect x="1" y="1" width="19" height="10" rx="3" stroke="currentColor" stroke-width="1.2" opacity=".5"/><rect x="2.5" y="2.5" width="14" height="7" rx="1.5" fill="currentColor"/><rect x="21" y="4" width="1.6" height="4" rx="1" fill="currentColor" opacity=".5"/></svg>
        </div>
      </div>

      <!-- scroll body -->
      <div style="position:absolute;inset:0;overflow-y:auto;padding:60px 20px 118px">

        <!-- header -->
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
          <div>
            <div style="font:500 13px 'Noto Sans JP';color:#8C8C8C;margin-bottom:3px">こんにちは、今日も記録しよう</div>
            <div style="font:700 22px 'M PLUS Rounded 1c';color:#2B2B2B;letter-spacing:.01em">7月4日<span style="font-size:15px;color:#8C8C8C;margin-left:6px;font-weight:500">金曜日</span></div>
          </div>
          <div style="width:44px;height:44px;border-radius:50%;background:#FFEDE6;display:flex;align-items:center;justify-content:center;flex-shrink:0">
            <span style="font:700 17px 'M PLUS Rounded 1c';color:#FF6B4A">R</span>
          </div>
        </div>

        <!-- streak banner (accent, celebrate only) -->
        <sc-if value="{{ celebrate }}" hint-placeholder-val="{{ false }}">
          <div style="display:flex;align-items:center;gap:10px;background:linear-gradient(100deg,#FFC145,#FFB01F);border-radius:16px;padding:12px 16px;margin-bottom:16px;box-shadow:0 8px 18px -8px rgba(255,177,31,.7);animation:pop .5s ease">
            <span style="font-size:20px">🎉</span>
            <div><div style="font:700 14px 'M PLUS Rounded 1c';color:#7A4A00">7日連続で記録中！</div><div style="font:400 11px 'Noto Sans JP';color:#946000">この調子で目標体重へ</div></div>
          </div>
        </sc-if>

        <!-- calorie hero card -->
        <div style="background:#fff;border-radius:22px;padding:20px;box-shadow:0 10px 26px -14px rgba(120,60,20,.28),0 1px 0 rgba(0,0,0,.02);margin-bottom:14px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
            <span style="font:500 13px 'Noto Sans JP';color:#8C8C8C">今日の摂取カロリー</span>
            <span style="font:500 11px 'Noto Sans JP';color:#2EC4B6;background:#E4F7F5;padding:4px 9px;border-radius:20px">目標 1,900 kcal</span>
          </div>
          <div style="display:flex;align-items:baseline;gap:6px;margin-bottom:14px">
            <span style="font:800 46px 'M PLUS Rounded 1c';color:#2B2B2B;line-height:1;letter-spacing:-.01em">{{ kcalStr }}</span>
            <span style="font:500 16px 'M PLUS Rounded 1c';color:#8C8C8C">kcal</span>
          </div>
          <!-- progress -->
          <div style="height:14px;background:#F0EBE3;border-radius:10px;overflow:hidden;margin-bottom:9px">
            <div style="height:100%;width:{{ pctWidth }};border-radius:10px;background:{{ barColor }};transition:width .5s cubic-bezier(.4,0,.2,1)"></div>
          </div>
          <div style="font:500 13px 'Noto Sans JP';color:{{ remainColor }};margin-bottom:16px">{{ remainText }}</div>
          <!-- PFC -->
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding-top:14px;border-top:1px solid #F2ECE3">
            <div>
              <div style="display:flex;align-items:baseline;gap:3px;margin-bottom:6px"><span style="font:700 11px 'Noto Sans JP';color:#8C8C8C">P</span><span style="font:700 18px 'M PLUS Rounded 1c';color:#2B2B2B">45</span><span style="font:500 11px 'M PLUS Rounded 1c';color:#8C8C8C">g</span></div>
              <div style="height:5px;background:#F0EBE3;border-radius:4px;overflow:hidden"><div style="height:100%;width:60%;background:#FF6B4A;border-radius:4px"></div></div>
            </div>
            <div>
              <div style="display:flex;align-items:baseline;gap:3px;margin-bottom:6px"><span style="font:700 11px 'Noto Sans JP';color:#8C8C8C">F</span><span style="font:700 18px 'M PLUS Rounded 1c';color:#2B2B2B">30</span><span style="font:500 11px 'M PLUS Rounded 1c';color:#8C8C8C">g</span></div>
              <div style="height:5px;background:#F0EBE3;border-radius:4px;overflow:hidden"><div style="height:100%;width:45%;background:#FFC145;border-radius:4px"></div></div>
            </div>
            <div>
              <div style="display:flex;align-items:baseline;gap:3px;margin-bottom:6px"><span style="font:700 11px 'Noto Sans JP';color:#8C8C8C">C</span><span style="font:700 18px 'M PLUS Rounded 1c';color:#2B2B2B">120</span><span style="font:500 11px 'M PLUS Rounded 1c';color:#8C8C8C">g</span></div>
              <div style="height:5px;background:#F0EBE3;border-radius:4px;overflow:hidden"><div style="height:100%;width:75%;background:#2EC4B6;border-radius:4px"></div></div>
            </div>
          </div>
        </div>

        <!-- weight + bodyfat grid (1c signature) -->
        <div style="display:grid;grid-template-columns:1.35fr 1fr;gap:14px;margin-bottom:22px">
          <div style="background:#fff;border-radius:22px;padding:18px;box-shadow:0 10px 26px -14px rgba(120,60,20,.28),0 1px 0 rgba(0,0,0,.02)">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
              <span style="font:500 13px 'Noto Sans JP';color:#8C8C8C">体重</span>
              <span style="font:400 11px 'Noto Sans JP';color:#B7AE9F">21:40</span>
            </div>
            <div style="display:flex;align-items:baseline;gap:4px;margin-bottom:8px">
              <span style="font:800 34px 'M PLUS Rounded 1c';color:#2B2B2B;line-height:1">72.1</span>
              <span style="font:500 14px 'M PLUS Rounded 1c';color:#8C8C8C">kg</span>
            </div>
            <div style="display:inline-flex;align-items:center;gap:3px;background:#E4F7F5;padding:4px 8px;border-radius:20px">
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M5 8V2M5 8L2.5 5.5M5 8L7.5 5.5" stroke="#2EC4B6" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
              <span style="font:700 12px 'M PLUS Rounded 1c';color:#2EC4B6">前回比 0.3kg</span>
            </div>
          </div>
          <div style="background:#fff;border-radius:22px;padding:18px;box-shadow:0 10px 26px -14px rgba(120,60,20,.28),0 1px 0 rgba(0,0,0,.02)">
            <div style="font:500 13px 'Noto Sans JP';color:#8C8C8C;margin-bottom:10px">体脂肪率</div>
            <div style="display:flex;align-items:baseline;gap:4px;margin-bottom:8px">
              <span style="font:800 34px 'M PLUS Rounded 1c';color:#2B2B2B;line-height:1">22.4</span>
              <span style="font:500 14px 'M PLUS Rounded 1c';color:#8C8C8C">%</span>
            </div>
            <span style="font:400 11px 'Noto Sans JP';color:#B7AE9F">体組成計より</span>
          </div>
        </div>

        <!-- meals -->
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:0 2px">
          <span style="font:700 16px 'M PLUS Rounded 1c';color:#2B2B2B">今日の食事</span>
          <span style="font:500 12px 'Noto Sans JP';color:#8C8C8C">合計 {{ kcalStr }} kcal</span>
        </div>

        <div style="display:flex;flex-direction:column;gap:10px">
          <!-- 朝食（タップで編集・削除画面へ） -->
          <div style="background:#fff;border-radius:18px;padding:14px 15px;display:flex;align-items:center;gap:13px;box-shadow:0 8px 20px -14px rgba(120,60,20,.26);cursor:pointer">
            <div style="width:42px;height:42px;border-radius:13px;background:#FFF1D9;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 4v2M5.5 9.5 7 11M18.5 9.5 17 11M4 20h16M8 20a4 4 0 0 1 8 0" stroke="#E0A62A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;gap:7px;margin-bottom:2px"><span style="font:700 13px 'M PLUS Rounded 1c';color:#2B2B2B">朝食</span><span style="font:400 11px 'Noto Sans JP';color:#B7AE9F">07:30</span><span style="font:500 9px 'Noto Sans JP';color:#C6A05A;background:#FBF1DD;padding:2px 6px;border-radius:6px">未同期</span></div>
              <div style="font:400 12px 'Noto Sans JP';color:#8C8C8C;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">トースト+卵</div>
            </div>
            <div style="text-align:right;flex-shrink:0"><span style="font:700 16px 'M PLUS Rounded 1c';color:#2B2B2B">420</span><span style="font:500 10px 'M PLUS Rounded 1c';color:#8C8C8C;margin-left:2px">kcal</span></div>
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" style="flex-shrink:0;opacity:.35;margin-left:1px"><path d="M6 4l4 4-4 4" stroke="#2B2B2B" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <!-- 昼食（タップで編集・削除画面へ） -->
          <div style="background:#fff;border-radius:18px;padding:14px 15px;display:flex;align-items:center;gap:13px;box-shadow:0 8px 20px -14px rgba(120,60,20,.26);cursor:pointer">
            <div style="width:42px;height:42px;border-radius:13px;background:#FFE6DE;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3.5 11h17M5 11a7 7 0 0 0 14 0M12 5c0 1.1 1 1.4 1 2.4M9.2 6.2c0 .8.6 1 .6 1.8" stroke="#FF6B4A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;gap:7px;margin-bottom:2px"><span style="font:700 13px 'M PLUS Rounded 1c';color:#2B2B2B">昼食</span><span style="font:400 11px 'Noto Sans JP';color:#B7AE9F">12:15</span></div>
              <div style="font:400 12px 'Noto Sans JP';color:#8C8C8C;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">鶏肉と野菜炒め</div>
            </div>
            <div style="text-align:right;flex-shrink:0"><span style="font:700 16px 'M PLUS Rounded 1c';color:#2B2B2B">580</span><span style="font:500 10px 'M PLUS Rounded 1c';color:#8C8C8C;margin-left:2px">kcal</span></div>
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" style="flex-shrink:0;opacity:.35;margin-left:1px"><path d="M6 4l4 4-4 4" stroke="#2B2B2B" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <!-- 夕食 未記録 -->
          <div style="background:transparent;border:1.5px dashed #DED4C4;border-radius:18px;padding:14px 15px;display:flex;align-items:center;gap:13px">
            <div style="width:42px;height:42px;border-radius:13px;background:#F4EEE4;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M7 3v7a2 2 0 0 0 4 0V3M9 3v18M17 3c-1.5 0-2.5 2-2.5 5s1 4 2.5 4v9" stroke="#C3B29A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
            <div style="flex:1"><span style="font:700 13px 'M PLUS Rounded 1c';color:#8C8C8C">夕食</span><div style="font:400 12px 'Noto Sans JP';color:#B7AE9F;margin-top:2px">未記録</div></div>
            <div style="width:26px;height:26px;border-radius:50%;background:#FFEDE6;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 2.5V10.5M2.5 6.5H10.5" stroke="#FF6B4A" stroke-width="1.6" stroke-linecap="round"/></svg></div>
          </div>
          <!-- 間食 未記録 -->
          <div style="background:transparent;border:1.5px dashed #DED4C4;border-radius:18px;padding:14px 15px;display:flex;align-items:center;gap:13px">
            <div style="width:42px;height:42px;border-radius:13px;background:#F4EEE4;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8" stroke="#C3B29A" stroke-width="1.8"/><circle cx="9.5" cy="10" r="1" fill="#C3B29A"/><circle cx="14.2" cy="9.6" r="1" fill="#C3B29A"/><circle cx="13" cy="14.2" r="1" fill="#C3B29A"/><circle cx="9.3" cy="14.4" r="1" fill="#C3B29A"/></svg></div>
            <div style="flex:1"><span style="font:700 13px 'M PLUS Rounded 1c';color:#8C8C8C">間食</span><div style="font:400 12px 'Noto Sans JP';color:#B7AE9F;margin-top:2px">未記録</div></div>
            <div style="width:26px;height:26px;border-radius:50%;background:#FFEDE6;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 2.5V10.5M2.5 6.5H10.5" stroke="#FF6B4A" stroke-width="1.6" stroke-linecap="round"/></svg></div>
          </div>
        </div>

      </div>

      <!-- FAB -->
      <div style="position:absolute;right:20px;bottom:96px;z-index:25">
        <div style="width:60px;height:60px;border-radius:50%;background:linear-gradient(145deg,#FF7B5C,#FF5A38);display:flex;align-items:center;justify-content:center;box-shadow:0 14px 26px -8px rgba(255,90,56,.7),0 2px 4px rgba(0,0,0,.1)">
          <svg width="26" height="26" viewBox="0 0 26 26" fill="none"><path d="M13 5V21M5 13H21" stroke="#fff" stroke-width="2.6" stroke-linecap="round"/></svg>
        </div>
      </div>

      <!-- bottom nav -->
      <div style="position:absolute;left:0;right:0;bottom:0;height:84px;background:rgba(255,248,240,.92);backdrop-filter:blur(12px);border-top:1px solid #F0E7DB;display:flex;align-items:flex-start;justify-content:space-around;padding:12px 18px 0;z-index:20">
        <div style="display:flex;flex-direction:column;align-items:center;gap:5px;padding:7px 18px;border-radius:16px;background:#FFEDE6">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 10.5 12 3l9 7.5" stroke="#FF6B4A" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/><path d="M5.5 9.5V20h13V9.5" stroke="#FF6B4A" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span style="font:700 10px 'M PLUS Rounded 1c';color:#FF6B4A">ホーム</span>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:5px;padding:7px 18px">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M4 18V6M4 18h16M8 15l4-5 3 3 4-6" stroke="#B7AE9F" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span style="font:500 10px 'M PLUS Rounded 1c';color:#B7AE9F">推移</span>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:5px;padding:7px 18px">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M6 8h12M6 8a2 2 0 1 1-4 0 2 2 0 0 1 4 0Zm12 8H6m12 0a2 2 0 1 0 4 0 2 2 0 0 0-4 0Z" stroke="#B7AE9F" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span style="font:500 10px 'M PLUS Rounded 1c';color:#B7AE9F">設定</span>
        </div>
      </div>

    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:440,&quot;height&quot;:890},&quot;caloriesConsumed&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:1000,&quot;min&quot;:0,&quot;max&quot;:2600,&quot;step&quot;:10,&quot;unit&quot;:&quot;kcal&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;状態&quot;},&quot;celebrate&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;状態&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const target = 1900;
    const kcal = this.props.caloriesConsumed ?? 1000;
    const celebrate = this.props.celebrate ?? false;
    const pct = Math.max(0, Math.min(100, (kcal / target) * 100));
    const over = kcal > target;
    const diff = Math.abs(target - kcal);
    const fmt = (n) => Math.round(n).toLocaleString('en-US');
    return {
      celebrate,
      kcalStr: fmt(kcal),
      pctWidth: pct.toFixed(1) + '%',
      barColor: over ? '#FF6B4A' : '#2EC4B6',
      remainColor: over ? '#FF6B4A' : '#8C8C8C',
      remainText: over
        ? `${fmt(diff)}kcal オーバーしています`
        : `あと ${fmt(diff)}kcal 食べられます`,
    };
  }
}
</script>
</body>
</html>
